services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: debuggai_app
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PROJECTS_DIR: /var/lib/debuggai/projects
      SANDBOX_BASE_PORT: "4000"
      MAX_SANDBOXES: "10"
      SANDBOX_TIMEOUT_MS: "1800000"
      SANDBOX_DOCKER_IMAGE: "node:20-slim"
    volumes:
      # Required so the app can start/stop sandbox containers on the host.
      - /var/run/docker.sock:/var/run/docker.sock
      # Persist sandboxes and exported zips across deploys/restarts.
      - debuggai_projects:/var/lib/debuggai/projects
    ports:
      - "3000:3000"

  caddy:
    image: caddy:2-alpine
    container_name: debuggai_caddy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  debuggai_projects:
  caddy_data:
  caddy_config:

