<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workspace IDE - Mobile Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #fafafa;
      --bg-tertiary: #f5f5f5;
      --border-default: #e5e5e5;
      --text-primary: #171717;
      --text-secondary: #737373;
      --text-tertiary: #a3a3a3;
      --accent: #171717;
      --success: #22c55e;
      --error: #ef4444;
      --warning: #f59e0b;
      --radius-sm: 2px;
      --radius-md: 4px;
      --radius-lg: 6px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      line-height: 1.6;
      color: var(--text-primary);
      background: var(--bg-primary);
    }

    /* Mobile Header */
    .mobile-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-default);
      background: var(--bg-secondary);
      height: 48px;
    }

    .mobile-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .mobile-menu-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: none;
      font-size: 18px;
      cursor: pointer;
    }

    .mobile-project-info {
      flex: 1;
      min-width: 0;
    }

    .mobile-project-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .mobile-header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .mobile-credits {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      font-size: 11px;
      border-radius: var(--radius-md);
      background: var(--bg-tertiary);
    }

    .run-btn {
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      background: var(--accent);
      color: white;
      cursor: pointer;
    }

    /* Editor Area */
    .editor-area {
      height: calc(100vh - 48px - 56px); /* Header + bottom tabs */
      overflow-y: auto;
      padding: 16px;
      font-family: 'SF Mono', monospace;
      font-size: 12px;
      background: var(--bg-primary);
    }

    .code-line {
      display: flex;
      gap: 12px;
      margin-bottom: 4px;
    }

    .line-number {
      color: var(--text-tertiary);
      min-width: 20px;
    }

    /* Mobile Bottom Tabs */
    .mobile-tabs {
      display: flex;
      height: 56px;
      border-top: 1px solid var(--border-default);
      background: var(--bg-secondary);
    }

    .mobile-tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      font-size: 10px;
      color: var(--text-secondary);
      border: none;
      background: transparent;
      cursor: pointer;
      position: relative;
    }

    .mobile-tab.active {
      color: var(--accent);
    }

    .mobile-tab-icon {
      font-size: 18px;
    }

    .tab-badge {
      position: absolute;
      top: 4px;
      right: calc(50% - 20px);
      min-width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 500;
      padding: 0 4px;
      border-radius: 10px;
      background: var(--error);
      color: white;
    }

    .tab-badge.success {
      background: var(--success);
    }

    .tab-badge.warning {
      background: var(--warning);
    }

    /* Mobile Panel (Overlay) */
    .mobile-panel {
      position: fixed;
      top: 48px;
      left: 0;
      right: 0;
      bottom: 56px;
      background: var(--bg-secondary);
      z-index: 100;
      transform: translateY(100%);
      transition: transform 0.3s ease;
      display: flex;
      flex-direction: column;
    }

    .mobile-panel.active {
      transform: translateY(0);
    }

    .mobile-panel-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-default);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .mobile-panel-title {
      font-size: 14px;
      font-weight: 500;
    }

    .mobile-panel-close {
      padding: 4px 8px;
      font-size: 18px;
      border: none;
      background: none;
      cursor: pointer;
      color: var(--text-tertiary);
    }

    .mobile-panel-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    /* Mobile Menu (Sidebar) */
    .mobile-menu {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: 280px;
      background: var(--bg-secondary);
      z-index: 200;
      transform: translateX(-100%);
      transition: transform 0.3s ease;
      border-right: 1px solid var(--border-default);
    }

    .mobile-menu.active {
      transform: translateX(0);
    }

    .mobile-menu-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 199;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .mobile-menu-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .mobile-menu-header {
      padding: 16px;
      border-bottom: 1px solid var(--border-default);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .mobile-menu-section {
      padding: 12px 0;
    }

    .mobile-menu-section-title {
      font-size: 10px;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      padding: 0 16px;
      margin-bottom: 8px;
    }

    .mobile-menu-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      font-size: 14px;
      color: var(--text-primary);
      text-decoration: none;
    }

    /* Chat Messages */
    .message {
      margin-bottom: 16px;
    }

    .message-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .message-role {
      font-size: 11px;
      font-weight: 500;
    }

    .message-content {
      font-size: 13px;
      line-height: 1.6;
    }

    .message.user .message-content {
      background: var(--bg-tertiary);
      padding: 10px 12px;
      border-radius: var(--radius-md);
    }

    /* Console */
    .console-item {
      padding: 10px 12px;
      border-radius: var(--radius-md);
      margin-bottom: 8px;
      font-family: 'SF Mono', monospace;
      font-size: 11px;
    }

    .console-item.error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    /* File Tree in Panel */
    .file-tree-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      font-size: 13px;
      border-radius: var(--radius-md);
      cursor: pointer;
    }

    .file-tree-item:hover {
      background: var(--bg-tertiary);
    }
  </style>
</head>
<body>
  <!-- Mobile Header -->
  <header class="mobile-header">
    <div class="mobile-header-left">
      <button class="mobile-menu-btn" onclick="toggleMenu()">☰</button>
      <div class="mobile-project-info">
        <div class="mobile-project-name">API Dashboard</div>
      </div>
    </div>
    <div class="mobile-header-right">
      <div class="mobile-credits">
        <span>⚡</span>
        <span>2.4k</span>
      </div>
      <button class="run-btn">▶</button>
    </div>
  </header>

  <!-- Editor Area -->
  <div class="editor-area">
    <div class="code-line">
      <span class="line-number">1</span>
      <span>import React, { useState } from 'react';</span>
    </div>
    <div class="code-line">
      <span class="line-number">2</span>
      <span></span>
    </div>
    <div class="code-line">
      <span class="line-number">3</span>
      <span>export function Dashboard() {</span>
    </div>
    <div class="code-line">
      <span class="line-number">4</span>
      <span>  const [data, setData] = useState([]);</span>
    </div>
    <div class="code-line">
      <span class="line-number">5</span>
      <span>  return (</span>
    </div>
    <div class="code-line">
      <span class="line-number">6</span>
      <span>    &lt;div&gt;Hello World&lt;/div&gt;</span>
    </div>
    <div class="code-line">
      <span class="line-number">7</span>
      <span>  );</span>
    </div>
    </div>
  </div>

  <!-- Mobile Bottom Tabs -->
  <div class="mobile-tabs">
    <button class="mobile-tab active" onclick="showPanel('chat')">
      <span class="mobile-tab-icon">💬</span>
      <span>Chat</span>
      <span class="tab-badge">5</span>
    </button>
    <button class="mobile-tab" onclick="showPanel('console')">
      <span class="mobile-tab-icon">🐛</span>
      <span>Console</span>
      <span class="tab-badge error">2</span>
    </button>
    <button class="mobile-tab" onclick="showPanel('git')">
      <span class="mobile-tab-icon">📝</span>
      <span>Git</span>
      <span class="tab-badge warning">3</span>
    </button>
    <button class="mobile-tab" onclick="showPanel('env')">
      <span class="mobile-tab-icon">⚙️</span>
      <span>Env</span>
    </button>
  </div>

  <!-- Mobile Panel Overlay -->
  <div class="mobile-panel" id="mobilePanel">
    <div class="mobile-panel-header">
      <span class="mobile-panel-title" id="panelTitle">Chat</span>
      <button class="mobile-panel-close" onclick="hidePanel()">×</button>
    </div>
    <div class="mobile-panel-content" id="panelContent">
      <!-- Content injected by JS -->
    </div>
  </div>

  <!-- Mobile Menu Sidebar -->
  <div class="mobile-menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>
  <div class="mobile-menu" id="mobileMenu">
    <div class="mobile-menu-header">
      <span style="font-weight: 600;">Menu</span>
      <button onclick="toggleMenu()" style="border: none; background: none; font-size: 20px; cursor: pointer;">×</button>
    </div>

    <div class="mobile-menu-section">
      <div class="mobile-menu-section-title">Workspace</div>
      <a href="#" class="mobile-menu-item">⌂ Dashboard</a>
      <a href="#" class="mobile-menu-item">⚡ Web Builder</a>
      <a href="#" class="mobile-menu-item">🐛 Debug Session</a>
    </div>

    <div class="mobile-menu-section">
      <div class="mobile-menu-section-title">Explorer</div>
      <div class="file-tree-item">
        <span>📁</span>
        <span>src</span>
      </div>
      <div class="file-tree-item" style="padding-left: 32px;">
        <span>📁</span>
        <span>components</span>
      </div>
      <div class="file-tree-item" style="padding-left: 48px;">
        <span>⚛️</span>
        <span>Dashboard.tsx</span>
      </div>
    </div>
  </div>

  <script>
    const panelContent = {
      chat: `
        <div class="message">
          <div class="message-header">
            <span class="message-role">AI</span>
          </div>
          <div class="message-content">I can help you debug this code. What would you like to work on?</div>
        </div>
        <div class="message user">
          <div class="message-header">
            <span class="message-role">You</span>
          </div>
          <div class="message-content">Add error handling to the fetchData function</div>
        </div>
      `,
      console: `
        <div class="console-item error">
          <div style="color: var(--error); margin-bottom: 4px;">✖ Error: Cannot read property 'map' of undefined</div>
          <div style="color: var(--text-tertiary);">Dashboard.tsx:13:45</div>
        </div>
        <div class="console-item warning">
          <div style="color: var(--warning); margin-bottom: 4px;">⚠ Warning: Unused variable 'data'</div>
          <div style="color: var(--text-tertiary);">Dashboard.tsx:5:12</div>
        </div>
      `,
      git: `
        <div class="file-tree-item">
          <span>📝</span>
          <div style="flex: 1;">
            <div style="font-weight: 500;">Dashboard.tsx</div>
            <div style="font-size: 11px; color: var(--text-secondary);">Modified • +3 -1</div>
          </div>
        </div>
      `,
      env: `
        <div class="file-tree-item">
          <span>⚙️</span>
          <div style="flex: 1;">
            <div style="font-family: monospace; font-size: 12px; color: var(--accent);">API_KEY</div>
            <div style="font-size: 11px; color: var(--text-tertiary);">•••••••••••••••••</div>
          </div>
        </div>
      `
    };

    function showPanel(tool) {
      const panel = document.getElementById('mobilePanel');
      const title = document.getElementById('panelTitle');
      const content = document.getElementById('panelContent');

      // Update active tab
      document.querySelectorAll('.mobile-tab').forEach(tab => tab.classList.remove('active'));
      event.target.closest('.mobile-tab').classList.add('active');

      // Update panel content
      const titles = { chat: 'Chat', console: 'Console', git: 'Git', env: 'Environment' };
      title.textContent = titles[tool];
      content.innerHTML = panelContent[tool];

      // Show panel
      panel.classList.add('active');
    }

    function hidePanel() {
      document.getElementById('mobilePanel').classList.remove('active');
    }

    function toggleMenu() {
      const menu = document.getElementById('mobileMenu');
      const overlay = document.getElementById('menuOverlay');
      menu.classList.toggle('active');
      overlay.classList.toggle('active');
    }
  </script>
</body>
</html>
